version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: sn_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smartnest

  backend:
    build: ./backend
    container_name: sn_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/sleep_guardian
      JWT_SECRET: your_super_secret_key_change_this
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  mongodb_data:
